apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-health" (include "common.names.fullname" .) }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
data:
  ping_readiness_local.sh: |-
    #!/bin/bash

    timeout=$1
    run_valkey_command() {
{{- if .Values.tls.enabled }}
        local args=("--tls" "-p" "$VALKEY_TLS_PORT")
        {{- if not (empty (include "valkey.tlsCACert" .)) }}
        args+=("--cacert" {{ template "valkey.tlsCACert" . }})
        {{- end }}
        {{- if .Values.tls.authClients }}
        args+=("--cert" {{ template "valkey.tlsCert" . }} "--key" {{ template "valkey.tlsCertKey" . }})
        {{- end }}
{{- else }}
        local args=("-p" "$VALKEY_PORT")
{{- end }}
        timeout -s 15 $timeout valkey-cli "${args[@]}" "$@"
    }

    [[ -f $VALKEY_PASSWORD_FILE ]] && export VALKEY_PASSWORD="$(< "${VALKEY_PASSWORD_FILE}")"
    [[ -n "$VALKEY_PASSWORD" ]] && export REDISCLI_AUTH="$VALKEY_PASSWORD"
    response=$(run_valkey_command ping)
    if [ "$?" -eq "124" ]; then
      echo "Timed out"
      exit 1
    fi
    if [ "$response" != "PONG" ]; then
      echo "$response"
      exit 1
    fi
{{- if and .Values.sentinel.enabled .Values.sentinel.replicaSyncCheck }}
    replication_info=$(run_valkey_command info replication)
    if [ "$?" -eq "124" ]; then
      echo "Timed out"
      exit 1
    fi
    role=$(echo "$replication_info" | grep role | cut -d: -f2 | tr -d '\r')
    if [[ "$role" = "slave" ]] || [[ "$role" = "replica" ]]; then
      primary_link_status=$(echo "$replication_info" | grep master_link_status | cut -d: -f2 | tr -d '\r')
      primary_sync_in_progress=$(echo "$replication_info" | grep master_sync_in_progress | cut -d: -f2 | tr -d '\r')
      if [[ "$primary_link_status" != "up" ]]; then
          echo "Replica link to primary is DOWN"
          exit 1
      fi
      if [[ "$primary_sync_in_progress" != "0" ]]; then
          echo "Replica is currently syncing data from primary"
          exit 1
      fi
    fi
{{- end }}
  ping_liveness_local.sh: |-
    #!/bin/bash

    [[ -f $VALKEY_PASSWORD_FILE ]] && export VALKEY_PASSWORD="$(< "${VALKEY_PASSWORD_FILE}")"
    [[ -n "$VALKEY_PASSWORD" ]] && export REDISCLI_AUTH="$VALKEY_PASSWORD"
    response=$(
      timeout -s 15 $1 \
      valkey-cli \
        -h localhost \
        {{- if .Values.tls.enabled }}
        -p $VALKEY_TLS_PORT \
        --tls \
        --cacert {{ template "valkey.tlsCACert" . }} \
          {{- if .Values.tls.authClients }}
          --cert {{ template "valkey.tlsCert" . }} \
          --key {{ template "valkey.tlsCertKey" . }} \
          {{- end }}
        {{- else }}
        -p $VALKEY_PORT \
        {{- end }}
        ping
    )
    if [ "$?" -eq "124" ]; then
      echo "Timed out"
      exit 1
    fi
    responseFirstWord=$(echo $response | head -n1 | awk '{print $1;}')
    if [ "$response" != "PONG" ] && [ "$responseFirstWord" != "LOADING" ] && [ "$responseFirstWord" != "MASTERDOWN" ]; then
      echo "$response"
      exit 1
    fi
{{- if .Values.sentinel.enabled }}
  ping_sentinel.sh: |-
    #!/bin/bash

    {{- if .Values.auth.sentinel }}
    [[ -f $VALKEY_PASSWORD_FILE ]] && export VALKEY_PASSWORD="$(< "${VALKEY_PASSWORD_FILE}")"
    [[ -n "$VALKEY_PASSWORD" ]] && export REDISCLI_AUTH="$VALKEY_PASSWORD"
    {{- end }}
    response=$(
      timeout -s 15 $1 \
      valkey-cli \
        -h localhost \
        {{- if .Values.tls.enabled }}
        -p $VALKEY_SENTINEL_TLS_PORT_NUMBER \
        --tls \
        --cacert "$VALKEY_SENTINEL_TLS_CA_FILE" \
          {{- if .Values.tls.authClients }}
          --cert "$VALKEY_SENTINEL_TLS_CERT_FILE" \
          --key "$VALKEY_SENTINEL_TLS_KEY_FILE" \
          {{- end }}
        {{- else }}
        -p $VALKEY_SENTINEL_PORT \
        {{- end }}
        ping
    )
    if [ "$?" -eq "124" ]; then
      echo "Timed out"
      exit 1
    fi
    if [ "$response" != "PONG" ]; then
      echo "$response"
      exit 1
    fi
  parse_sentinels.awk: |-
    /ip/ {FOUND_IP=1}
    /port/ {FOUND_PORT=1}
    /runid/ {FOUND_RUNID=1}
    !/ip|port|runid/ {
      if (FOUND_IP==1) {
        IP=$1; FOUND_IP=0;
      }
      else if (FOUND_PORT==1) {
        PORT=$1;
        FOUND_PORT=0;
      } else if (FOUND_RUNID==1) {
        printf "\nsentinel known-sentinel {{ .Values.sentinel.primarySet }} %s %s %s", IP, PORT, $0; FOUND_RUNID=0;
      }
    }
{{- else }}
  ping_readiness_primary.sh: |-
    #!/bin/bash

    [[ -f $VALKEY_PRIMARY_PASSWORD_FILE ]] && export VALKEY_PRIMARY_PASSWORD="$(< "${VALKEY_PRIMARY_PASSWORD_FILE}")"
    [[ -n "$VALKEY_PRIMARY_PASSWORD" ]] && export REDISCLI_AUTH="$VALKEY_PRIMARY_PASSWORD"
    response=$(
      timeout -s 15 $1 \
      valkey-cli \
        -h $VALKEY_PRIMARY_HOST \
        -p $VALKEY_PRIMARY_PORT_NUMBER \
        {{- if .Values.tls.enabled }}
        --tls \
        --cacert {{ template "valkey.tlsCACert" . }} \
          {{- if .Values.tls.authClients }}
          --cert {{ template "valkey.tlsCert" . }} \
          --key {{ template "valkey.tlsCertKey" . }} \
          {{- end }}
        {{- end }}
        ping
    )
    if [ "$?" -eq "124" ]; then
      echo "Timed out"
      exit 1
    fi
    if [ "$response" != "PONG" ]; then
      echo "$response"
      exit 1
    fi
  ping_liveness_primary.sh: |-
    #!/bin/bash

    [[ -f $VALKEY_PRIMARY_PASSWORD_FILE ]] && export VALKEY_PRIMARY_PASSWORD="$(< "${VALKEY_PRIMARY_PASSWORD_FILE}")"
    [[ -n "$VALKEY_PRIMARY_PASSWORD" ]] && export REDISCLI_AUTH="$VALKEY_PRIMARY_PASSWORD"
    response=$(
      timeout -s 15 $1 \
      valkey-cli \
        -h $VALKEY_PRIMARY_HOST \
        -p $VALKEY_PRIMARY_PORT_NUMBER \
        {{- if .Values.tls.enabled }}
        --tls \
        --cacert {{ template "valkey.tlsCACert" . }} \
          {{- if .Values.tls.authClients }}
          --cert {{ template "valkey.tlsCert" . }} \
          --key {{ template "valkey.tlsCertKey" . }} \
          {{- end }}
        {{- end }}
        ping
    )
    if [ "$?" -eq "124" ]; then
      echo "Timed out"
      exit 1
    fi
    responseFirstWord=$(echo $response | head -n1 | awk '{print $1;}')
    if [ "$response" != "PONG" ] && [ "$responseFirstWord" != "LOADING" ]; then
      echo "$response"
      exit 1
    fi
  ping_readiness_local_and_primary.sh: |-
    script_dir="$(dirname "$0")"
    exit_status=0
    "$script_dir/ping_readiness_local.sh" $1 || exit_status=$?
    "$script_dir/ping_readiness_primary.sh" $1 || exit_status=$?
    exit $exit_status
  ping_liveness_local_and_primary.sh: |-
    script_dir="$(dirname "$0")"
    exit_status=0
    "$script_dir/ping_liveness_local.sh" $1 || exit_status=$?
    "$script_dir/ping_liveness_primary.sh" $1 || exit_status=$?
    exit $exit_status
{{- end }}
