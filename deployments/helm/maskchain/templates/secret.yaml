# @sk-task helm-chart#T2.2: Secret with api-keys env vars for ${VAR} substitution (AC-004, AC-005)
# Auto-generates POSTGRES_DSN / VALKEY_ADDR / VALKEY_PASSWORD from subchart settings.
# User-supplied .Values.apiKeys take precedence over auto-generated values.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "maskchain.fullname" . }}-api-keys
  labels:
    {{- include "maskchain.labels" . | nindent 4 }}
type: Opaque
data:
  {{- /* Auto-generated internal PostgreSQL DSN (unless user provided it) */}}
  {{- if and .Values.postgresql.enabled (not .Values.postgresql.external.enabled) (not (hasKey .Values.apiKeys "POSTGRES_DSN")) }}
  POSTGRES_DSN: {{ printf "postgres://%s:%s@%s-postgresql:5432/%s?sslmode=disable" .Values.postgresql.auth.username .Values.postgresql.auth.password .Release.Name .Values.postgresql.auth.database | b64enc | quote }}
  {{- end }}
  {{- /* External PostgreSQL DSN (unless user provided it) */}}
  {{- if and .Values.postgresql.enabled .Values.postgresql.external.enabled (not (hasKey .Values.apiKeys "POSTGRES_DSN")) }}
  POSTGRES_DSN: {{ .Values.postgresql.external.dsn | b64enc | quote }}
  {{- end }}

  {{- /* Auto-generated internal Valkey addr+password (unless user provided them) */}}
  {{- if and .Values.valkey.enabled (not .Values.valkey.external.enabled) (not (hasKey .Values.apiKeys "VALKEY_ADDR")) }}
  VALKEY_ADDR: {{ printf "%s-valkey:6379" .Release.Name | b64enc | quote }}
  {{- end }}
  {{- if and .Values.valkey.enabled (not .Values.valkey.external.enabled) (not (hasKey .Values.apiKeys "VALKEY_PASSWORD")) }}
  VALKEY_PASSWORD: {{ .Values.valkey.auth.password | b64enc | quote }}
  {{- end }}
  {{- /* External Valkey addr+password (unless user provided them) */}}
  {{- if and .Values.valkey.enabled .Values.valkey.external.enabled (not (hasKey .Values.apiKeys "VALKEY_ADDR")) }}
  VALKEY_ADDR: {{ .Values.valkey.external.addr | b64enc | quote }}
  {{- end }}
  {{- if and .Values.valkey.enabled .Values.valkey.external.enabled (not (hasKey .Values.apiKeys "VALKEY_PASSWORD")) }}
  VALKEY_PASSWORD: {{ .Values.valkey.auth.password | b64enc | quote }}
  {{- end }}

  {{- /* User-supplied apiKeys */}}
  {{- range $key, $value := .Values.apiKeys }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
