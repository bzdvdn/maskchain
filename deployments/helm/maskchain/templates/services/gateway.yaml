# @sk-task helm-chart#T2.4: Gateway Service (AC-001, AC-006)
{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "maskchain.fullname" . }}-gateway
  labels:
    {{- include "maskchain.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.configBase.server.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "maskchain.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
{{- end }}
