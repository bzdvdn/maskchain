# @sk-task helm-chart#T5.1: All-mode Ingresses — gateway + admin routes (AC-007)
{{- if and .Values.all.ingress.enabled .Values.all.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "maskchain.fullname" . }}-gateway
  labels:
    {{- include "maskchain.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.all.ingress.annotations | nindent 4 }}
spec:
  {{- with .Values.all.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.all.ingress.host }}
      http:
        paths:
          - path: {{ .Values.all.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "maskchain.fullname" . }}-all
                port:
                  number: {{ .Values.configBase.server.port }}
  {{- with .Values.all.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "maskchain.fullname" . }}-admin
  labels:
    {{- include "maskchain.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.all.ingress.admin_annotations | nindent 4 }}
spec:
  {{- with .Values.all.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.all.ingress.admin_host }}
      http:
        paths:
          - path: {{ .Values.all.ingress.admin_path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "maskchain.fullname" . }}-all
                port:
                  number: {{ .Values.configBase.server.admin_port }}
  {{- with .Values.all.ingress.admin_tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
