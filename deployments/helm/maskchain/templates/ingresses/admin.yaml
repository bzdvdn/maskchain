# @sk-task helm-chart#T5.1: Admin Ingress (AC-007)
{{- if and .Values.admin.ingress.enabled .Values.admin.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "maskchain.fullname" . }}-admin
  labels:
    {{- include "maskchain.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.admin.ingress.annotations | nindent 4 }}
spec:
  {{- with .Values.admin.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.admin.ingress.host }}
      http:
        paths:
          - path: {{ .Values.admin.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "maskchain.fullname" . }}-admin
                port:
                  number: {{ .Values.configBase.server.admin_port }}
  {{- with .Values.admin.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
