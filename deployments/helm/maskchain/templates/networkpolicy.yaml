# @sk-task helm-chart#T5.4: Optional NetworkPolicy per component (AC-009)
{{- if and .Values.gateway.networkPolicy.enabled .Values.gateway.enabled (not .Values.all.enabled) }}
{{- $np := .Values.gateway.networkPolicy }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "maskchain.fullname" . }}-gateway
  labels:
    {{- include "maskchain.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  podSelector:
    matchLabels:
      {{- include "maskchain.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $np.ingressControllerNamespace }}
      ports:
        - port: {{ $.Values.configBase.server.port }}
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: primary
          {{- if $.Values.postgresql.enabled }}
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Release.Namespace }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: primary
          {{- end }}
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: master
          {{- if $.Values.valkey.enabled }}
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Release.Namespace }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: master
          {{- end }}
      ports:
        - port: 6379
          protocol: TCP
    {{- with $np.externalCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ . }}
    {{- end }}
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
