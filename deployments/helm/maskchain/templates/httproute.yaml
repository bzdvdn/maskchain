# @sk-task helm-chart#T5.5: Optional Gateway API HTTPRoute (AC-011)
{{- if .Values.gatewayAPI.enabled }}
{{- $gwSvc := ternary "all" "gateway" .Values.all.enabled }}
{{- $adSvc := ternary "all" "admin" .Values.all.enabled }}
{{- $adPort := ternary .Values.configBase.server.admin_port .Values.configBase.server.admin_port .Values.all.enabled }}
{{- if or .Values.gateway.enabled .Values.all.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "maskchain.fullname" . }}-gateway
  labels:
    {{- include "maskchain.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gatewayAPI.gatewayName }}
      {{- with .Values.gatewayAPI.gatewayNamespace }}
      namespace: {{ . }}
      {{- end }}
  hostnames:
    - {{ .Values.gatewayAPI.hostname }}
  rules:
    - backendRefs:
        - name: {{ include "maskchain.fullname" . }}-{{ $gwSvc }}
          port: {{ .Values.configBase.server.port }}
{{- end }}
{{- if or .Values.admin.enabled .Values.all.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "maskchain.fullname" . }}-admin
  labels:
    {{- include "maskchain.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gatewayAPI.gatewayName }}
      {{- with .Values.gatewayAPI.gatewayNamespace }}
      namespace: {{ . }}
      {{- end }}
  hostnames:
    - {{ .Values.gatewayAPI.adminHostname }}
  rules:
    - backendRefs:
        - name: {{ include "maskchain.fullname" . }}-{{ $adSvc }}
          port: {{ .Values.configBase.server.admin_port }}
{{- end }}
{{- end }}