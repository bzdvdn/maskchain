# @sk-task helm-chart#T5.2: Optional PodDisruptionBudget per component (AC-008)
{{- if .Values.gateway.pdb.enabled }}
{{- if .Values.gateway.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "maskchain.fullname" . }}-gateway
  labels:
    {{- include "maskchain.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  minAvailable: {{ .Values.gateway.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "maskchain.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
{{- end }}
{{- end }}
{{- if .Values.admin.pdb.enabled }}
{{- if .Values.admin.enabled }}
