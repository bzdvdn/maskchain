  selector:
    matchLabels:
      {{- include "maskchain.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: admin
{{- end }}
{{- end }}
{{- if .Values.all.pdb.enabled }}
{{- if .Values.all.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
