# @sk-task helm-chart#T5.5: All-mode HTTPRoutes — gateway + admin (AC-011)
{{- if and .Values.all.gatewayAPI.enabled .Values.all.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "maskchain.fullname" . }}-gateway
  labels:
    {{- include "maskchain.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.all.gatewayAPI.gatewayName }}
      {{- with .Values.all.gatewayAPI.gatewayNamespace }}
      namespace: {{ . }}
      {{- end }}
  hostnames:
    - {{ .Values.all.gatewayAPI.hostname }}
  rules:
    - backendRefs:
        - name: {{ include "maskchain.fullname" . }}-all
          port: {{ .Values.configBase.server.port }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "maskchain.fullname" . }}-admin
  labels:
    {{- include "maskchain.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.all.gatewayAPI.gatewayName }}
      {{- with .Values.all.gatewayAPI.gatewayNamespace }}
      namespace: {{ . }}
      {{- end }}
  hostnames:
    - {{ .Values.all.gatewayAPI.adminHostname }}
  rules:
    - backendRefs:
        - name: {{ include "maskchain.fullname" . }}-all
          port: {{ .Values.configBase.server.admin_port }}
{{- end }}
