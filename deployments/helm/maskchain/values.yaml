# @sk-task helm-chart#T1.1: Default values for MaskChain Helm chart

# -- Override the base name
nameOverride: ""
# -- Override the full name
fullnameOverride: ""

global:
  security:
    allowInsecureImages: true
  # -- Default priorityClassName for all components (overridable per component)
  priorityClassName: ""

# -- Component flags. all.enabled=true конфликтует с gateway.enabled и admin.enabled.
gateway:
  enabled: true
  image:
    repository: bzdvdn/maskchain-gateway
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  priorityClassName: ""
  ingress:
    enabled: false
    className: ""
    host: api.maskchain.local
    path: /
    annotations: {}
    tls: []
  gatewayAPI:
    enabled: false
    hostname: api.maskchain.local
    gatewayName: maskchain-gateway
    gatewayNamespace: ""
    tls:
      enabled: false
      certificateRef:
        name: ""
  pdb:
    enabled: false
    minAvailable: 1
  networkPolicy:
    enabled: false
    ingressControllerNamespace: ingress-nginx
    externalCIDRs: []

admin:
  enabled: false
  image:
    repository: bzdvdn/maskchain-admin
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  priorityClassName: ""
  ingress:
    enabled: false
    className: ""
    host: admin.maskchain.local
    path: /
    annotations: {}
    tls: []
  gatewayAPI:
    enabled: false
    hostname: admin.maskchain.local
    gatewayName: maskchain-gateway
    gatewayNamespace: ""
    tls:
      enabled: false
      certificateRef:
        name: ""
  pdb:
    enabled: false
    minAvailable: 1
  networkPolicy:
    enabled: false
    ingressControllerNamespace: ingress-nginx
    externalCIDRs: []

all:
  enabled: false
  image:
    repository: bzdvdn/maskchain
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  priorityClassName: ""
  ingress:
    enabled: false
    className: ""
    host: api.maskchain.local
    path: /
    annotations: {}
    tls: []
    admin_host: admin.maskchain.local
    admin_path: /
    admin_annotations: {}
    admin_tls: []
  gatewayAPI:
    enabled: false
    hostname: api.maskchain.local
    adminHostname: admin.maskchain.local
    gatewayName: maskchain-gateway
    gatewayNamespace: ""
    tls:
      enabled: false
      certificateRef:
        name: ""
  pdb:
    enabled: false
    minAvailable: 1
  networkPolicy:
    enabled: false
    ingressControllerNamespace: ingress-nginx
    externalCIDRs: []

# -- Base config — infrastructure sections (rarely change).
# Sensitive values use ${VAR} placeholders resolved from apiKeys secret.
configBase:
  log:
    level: info

  server:
    port: 8080
    admin_port: 9090
    shutdown_timeout: 30
    tenant_reload_interval: 15s
    health_check:
      critical_deps:
        - database

  database:
    dsn: "${POSTGRES_DSN}"
    max_conns: 25
    min_conns: 5
    max_conn_lifetime: 30m

  valkey:
    addr: "${VALKEY_ADDR}"
    password: "${VALKEY_PASSWORD}"
    ttl_sec: 3600

  mask:
    cache_ttl_sec: 3600

  egress:
    max_idle_conns: 25
    max_idle_conns_per_host: 4
    idle_timeout: 60s
    max_retries: 3
    base_backoff: 200ms
    retry_on_5xx: true
    disable_keep_alives: false
    circuit_breaker:
      max_failures: 5
      cooldown: 30s

  session:
    default_ttl: 1h
    max_ttl: 24h
    cache_ttl: 5m
    cleanup_interval: 15m
    cleanup_enabled: true

  otel:
    endpoint: ""
    service_name: "maskchain"
    environment: "production"
    sampling_ratio: 0.1

  ratelimit:
    default_rate_per_window: 100
    default_window_sec: 60

  dictionary_cache:
    valkey_ttl_sec: 300
    lru_size: 10000
    warm_on_startup: true
    warm_concurrency: 5

# -- Runtime config — business-logic sections (change more often).
# All blocks are `{}` / `[]` by default — uncomment and fill as needed.
configRuntime:
  # shield:
  #   action_on_suspicious: mask
  #   tenant_model_mapping:
  #     default:
