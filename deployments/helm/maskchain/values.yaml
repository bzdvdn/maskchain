  #       base_url: "https://api.anthropic.com"
  #       api_keys:
  #         - "${ANTHROPIC_API_KEY}"
  #       proxy_url: "http://corp-proxy:3128"
  #       timeout: 120s
  #       priority: 2
  #   rules:
  #     - tenant: default
  #       routes:
  #         - model: "gpt-4o"
  #           providers: ["openai"]
  routing:
    providers: []
    rules: []

  # admin:
  #   username: admin
  #   password: "${ADMIN_PASSWORD}"
  #   session_ttl: 30m
  #   dashboard_poll_interval: 5s
  admin: {}

  # debug:
  #   enabled: false
  #   admin_token: ""
  debug: {}

  # analytics:
  #   batch_interval: 5s
  #   retention_days: 90
  analytics: {}

  # tenants:
  #   default:
  #     name: "Default Tenant"
  #     auth_header: "Authorization"
  #     api_keys:
  #       - "${DEFAULT_API_KEY}"
  tenants: {}

# -- API keys and secrets injected as env vars for ${VAR} substitution in config.
# Each key becomes an environment variable in the Deployment.
apiKeys: {}
  # OPENAI_API_KEY: "sk-..."
  # ANTHROPIC_API_KEY: "sk-ant-..."   # required if anthropic provider is configured
  # GEMINI_API_KEY: "..."             # required if gemini provider is configured
  # GROQ_API_KEY: "gsk-..."           # required if groq (proxy) provider is configured
  # ADMIN_PASSWORD: "admin-secret"
  # DEFAULT_API_KEY: "dk-..."
  # POSTGRES_DSN: "postgres://user:pass@host:5432/db?sslmode=disable"
  # VALKEY_ADDR: "host:6379"
  # VALKEY_PASSWORD: ""

# -- Bitnami PostgreSQL subchart settings
postgresql:
  enabled: true
  image:
    registry: docker.io/bitnami
  auth:
    username: maskchain
    password: ""
    database: maskchain
  primary:
    persistence:
      size: 10Gi
  # -- External PostgreSQL mode
  external:
    enabled: false
    dsn: ""

# -- Bitnami Valkey subchart settings
valkey:
  enabled: true
  image:
    registry: docker.io/bitnami
  auth:
    password: ""
  architecture: standalone
  master:
    persistence:
      size: 5Gi
  # -- External Valkey mode
  external:
    enabled: false
    addr: ""

# -- Prometheus ServiceMonitor
servicemonitor:
  enabled: false
  interval: 15s
  scrapeTimeout: 10s
  labels: {}


