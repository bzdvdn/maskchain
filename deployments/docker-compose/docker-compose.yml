version: "3.9"

# @sk-task 100-admin-control-plane#T3.1: Add admin service, switch gateway to Dockerfile.gateway (AC-003, AC-010)
services:
  gateway:
    image: maskchain/gateway:latest
    build:
      context: ../..
      dockerfile: Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      CONFIG_DIR: /etc/maskchain/conf.d
    volumes:
      - ./config-base.yaml:/etc/maskchain/conf.d/00-config-base.yaml:ro
      - ./config-runtime.yaml:/etc/maskchain/conf.d/99-config-runtime.yaml:ro
    profiles:
      - production
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: "512M"
        reservations:
          cpus: "0.5"
          memory: "256M"
    healthcheck:
      test: ["CMD", "/gateway", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  admin:
    image: maskchain/admin:latest
    build:
      context: ../..
      dockerfile: Dockerfile.admin
    ports:
      - "8081:8081"
    environment:
      CONFIG_DIR: /etc/maskchain/conf.d
    volumes:
      - ./config-base.yaml:/etc/maskchain/conf.d/00-config-base.yaml:ro
      - ./config-runtime.yaml:/etc/maskchain/conf.d/99-config-runtime.yaml:ro
    profiles:
      - production
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: "256M"
        reservations:
          cpus: "0.5"
          memory: "128M"
    healthcheck:
      test: ["CMD", "/admin", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  all:
    image: maskchain/combined:latest
    build:
      context: ../..
      dockerfile: Dockerfile.combined
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      CONFIG_DIR: /etc/maskchain/conf.d
    volumes:
      - ./config-base.yaml:/etc/maskchain/conf.d/00-config-base.yaml:ro
      - ./config-runtime.yaml:/etc/maskchain/conf.d/99-config-runtime.yaml:ro
    profiles:
      - production
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: "768M"
        reservations:
          cpus: "0.5"
          memory: "256M"
    healthcheck:
      test: ["CMD", "/maskchain", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: maskchain
      POSTGRES_PASSWORD: maskchain
      POSTGRES_DB: maskchain
    profiles:
      - production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maskchain"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8-alpine
    profiles:
      - production
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
