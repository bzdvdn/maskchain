name: Feature Request
description: Suggest an idea for MaskChain
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "## Feature Request"
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Content Shield
        - Routing / Providers
        - Admin API / UI
        - Helm / Deployment
        - Performance
        - Documentation
        - Other
