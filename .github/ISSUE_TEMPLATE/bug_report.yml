name: Bug Report
description: Report a bug to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "## Bug Report"
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start gateway with config X
        2. Send request Y
        3. See error Z
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `gateway --version`
      placeholder: "e.g. 1.0.0-abc1234"
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose
        - Kubernetes (Helm)
        - Binary
  - type: textarea
    id: config
    attributes:
      label: Config (sanitized)
      render: yaml
