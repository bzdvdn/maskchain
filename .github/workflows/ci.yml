name: CI

on:
  push:
    branches: [main, master, "feature/**", "fix/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.3"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create UI dist stub
        run: mkdir -p ui/dist && echo '<html></html>' > ui/dist/index.html

      - name: Tidy and verify
        run: |
          go mod tidy
          go mod verify

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run ./...

      - name: Run go vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create UI dist stub
        run: mkdir -p ui/dist && echo '<html></html>' > ui/dist/index.html

      - name: Run tests with race detector
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build gateway
        run: make build-gateway

      - name: Build admin
        run: make build-admin-ci

      - name: Build combined
        run: make build-combined-ci

      - name: Check project structure
        run: make check-structure

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Build gateway image
        run: docker build -f Dockerfile.gateway -t bzdvdn/maskchain-gateway:ci .

      - name: Build admin image
        run: docker build -f Dockerfile.admin -t bzdvdn/maskchain-admin:ci .

      - name: Build combined image
        run: docker build -f Dockerfile.combined -t bzdvdn/maskchain:ci .

  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta (gateway)
        id: meta-gateway
        uses: docker/metadata-action@v5
        with:
          images: bzdvdn/maskchain-gateway
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest

      - name: Docker meta (admin)
        id: meta-admin
        uses: docker/metadata-action@v5
        with:
          images: bzdvdn/maskchain-admin
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest

      - name: Docker meta (combined)
        id: meta-combined
        uses: docker/metadata-action@v5
        with:
          images: bzdvdn/maskchain
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gateway
          push: true
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}

      - name: Build and push admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.admin
          push: true
          tags: ${{ steps.meta-admin.outputs.tags }}
          labels: ${{ steps.meta-admin.outputs.labels }}

      - name: Build and push combined
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.combined
          push: true
          tags: ${{ steps.meta-combined.outputs.tags }}
          labels: ${{ steps.meta-combined.outputs.labels }}

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,config
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint Helm chart
        run: helm lint deployments/helm/maskchain/

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: maskchain
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --publish 5432:5432
      valkey:
        image: valkey/valkey:8-alpine
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --publish 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build gateway binary
        run: CGO_ENABLED=0 go build -tags gateway -ldflags="-s -w" -o bin/gateway ./src/cmd/gateway/

      - name: Create CI config
        run: |
          mkdir -p /tmp/maskchain-ci
          cat > /tmp/maskchain-ci/00-config-base.yaml << 'YAML'
          log:
            level: debug
          server:
            port: 8080
            health_check:
              critical_deps: []
          database:
            dsn: "postgres://test:test@localhost:5432/maskchain?sslmode=disable"
            max_conns: 5
            min_conns: 1
            max_conn_lifetime: 5m
          valkey:
            addr: localhost:6379
            password: ""
            ttl_sec: 3600
          mask:
            cache_ttl_sec: 60
          YAML

      - name: Download Go modules
        run: go mod download

      - name: Start gateway
        run: |
          ./bin/gateway --config-dir /tmp/maskchain-ci &
          GATEWAY_PID=$!
          echo "GATEWAY_PID=$GATEWAY_PID" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Gateway is healthy!"
              break
            fi
            echo "Attempt $i/30: gateway not ready yet..."
            sleep 2
          done

      - name: Run API consistency tests
        run: |
          go test -tags=integration -race -count=1 -v ./test/integration/...

      - name: Dump gateway logs
        if: failure()
        run: |
          echo "=== Gateway was PID ${{ env.GATEWAY_PID }} ==="
          curl -sf http://localhost:8080/health || echo "gateway process may have exited"

      - name: Stop gateway
        if: always()
        run: kill ${{ env.GATEWAY_PID }} 2>/dev/null || true

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    defaults:
      run:
        working-directory: deployments/docker-compose
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Start services
        run: |
          docker compose up -d postgres valkey gateway
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Gateway is healthy!"
              break
            fi
            echo "Attempt $i/30: gateway not ready yet..."
            sleep 2
          done

      - name: Run API consistency tests
        run: |
          SERVER_URL=http://localhost:8080 go test -tags=integration -race -count=1 -v ../../test/integration/

      - name: Dump docker logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Cleanup
        if: always()
        run: docker compose down -v
