# MaskChain admin config — управление тенантами, сессиями, аналитика
# Оверрайды через CONFIG_* env vars. Запуск: docker compose up admin

log:
  level: debug

server:
  port: 8081
  admin_port: 9090
  shutdown_timeout: 30
  tenant_reload_interval: 15s
  cors_origins:
    - "http://localhost:5173"
  health_check:
    critical_deps:
      - database

database:
  dsn: "postgres://test:test@postgres:5432/maskchain?sslmode=disable"
  max_conns: 10
  min_conns: 2
  max_conn_lifetime: 30m

valkey:
  addr: valkey:6379
  password: ""
  ttl_sec: 3600

mask:
  cache_ttl_sec: 3600

session:
  default_ttl: 30m
  max_ttl: 24h
  cache_ttl: 5m
  cleanup_interval: 5m
  cleanup_enabled: true

admin:
  username: admin
  password: "${ADMIN_PASSWORD}"
  session_ttl: 30m
  dashboard_poll_interval: 5s

otel:
  endpoint: ""
  service_name: "maskchain-admin"
  environment: "development"
  sampling_ratio: 1.0

debug:
  enabled: true
  admin_token: "admin-token"

analytics:
  batch_interval: 5s
  retention_days: 7
  cost_rates:
    - model: "gemma3:4b"
      input_price_per_1k: 0
      output_price_per_1k: 0
    - model: "mistral-small-latest"
      input_price_per_1k: 0.001
      output_price_per_1k: 0.003

tenants:
  default:
    name: "Default Tenant"
    auth_header: "Authorization"
    api_keys:
      - "sk-admin-default"
    pii_config:
      enabled: true
      default_action: mask
      rules:
        - label: email
          type: regex
          pattern: EMAIL
          action: block
        - label: phone
          type: regex
          pattern: PHONE
          action: block
        - label: ssn
          type: regex
          pattern: SSN
          action: block
