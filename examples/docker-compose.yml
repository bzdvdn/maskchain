# Prod-like local dev stack for testing mask/unmask flow
# Usage: docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: maskchain-pg
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: maskchain
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d maskchain"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8-alpine
    container_name: maskchain-vk
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: ..
      dockerfile: Dockerfile.gateway
    container_name: maskchain-gateway
    ports:
      - "8080:8080"
    environment:
      CONFIG_LOG_LEVEL: debug
      CONFIG_SERVER_PORT: "8080"
      CONFIG_DATABASE_DSN: postgres://test:test@postgres:5432/maskchain?sslmode=disable
      CONFIG_VALKEY_ADDR: valkey:6379
      CONFIG_OTEL_ENDPOINT: ""
    volumes:
      - ./config.yaml:/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  admin:
    build:
      context: ..
      dockerfile: Dockerfile.admin
    container_name: maskchain-admin
    ports:
      - "8082:8081"
    environment:
      CONFIG_LOG_LEVEL: debug
      CONFIG_SERVER_PORT: "8081"
      CONFIG_DATABASE_DSN: postgres://test:test@postgres:5432/maskchain?sslmode=disable
      CONFIG_VALKEY_ADDR: valkey:6379
      CONFIG_OTEL_ENDPOINT: ""
    volumes:
      - ./config.yaml:/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: maskchain-prom
    ports:
      - "9090:9090"
    volumes:
      - promdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    environment:
      PROMETHEUS_CONFIG: |
        global:
          scrape_interval: 15s
        scrape_configs:
          - job_name: 'gateway'
            static_configs:
              - targets: ['gateway:8080']
                metrics_path: '/metrics'
          - job_name: 'admin'
            static_configs:
              - targets: ['admin:8081']
                metrics_path: '/metrics'
    depends_on:
      gateway:
        condition: service_started
      admin:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: maskchain-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  pgdata:
  promdata:
