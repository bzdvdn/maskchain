services:
  postgres:
    image: postgres:16-alpine
    container_name: maskchain-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: maskchain
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d maskchain"]
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: maskchain-gateway
    ports:
      - "8080:8080"
    environment:
      CONFIG_LOG_LEVEL: debug
      CONFIG_DATABASE_DSN: postgres://test:test@postgres:5432/maskchain?sslmode=disable
      CONFIG_SERVER_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
