# MaskChain combined config — admin + gateway в одном процессе
# Gateway на server.port (:8080), admin на server.admin_port (:9090)
# Запуск: docker compose up all  или  make docker-build-combined && docker run maskchain/combined

log:
  level: debug

server:
  port: 8080
  admin_port: 9090
  shutdown_timeout: 30
  tenant_reload_interval: 15s
  cors_origins:
    - "http://localhost:5173"
  health_check:
    critical_deps:
      - database

database:
  dsn: "postgres://test:test@postgres:5432/maskchain?sslmode=disable"
  max_conns: 10
  min_conns: 2
  max_conn_lifetime: 30m

valkey:
  addr: valkey:6379
  password: ""
  ttl_sec: 3600

mask:
  cache_ttl_sec: 3600

shield:
  action_on_suspicious: mask
  tenant_model_mapping:
    default:
      "gemma3:4b": "pii-protect"

routing:
  providers:
    - name: ollama
      api_type: ollama
      base_url: "http://host.docker.internal:11434"
      health_endpoint: "/api/tags"
      timeout: 120s
      priority: 1

    - name: mistral
      api_type: openai
      base_url: "https://api.mistral.ai"
      api_keys:
        - "${MISTRAL_KEY}"
      timeout: 60s
      priority: 2

  rules:
    - tenant: default
      routes:
        - model: "gemma3:4b"
          providers: ["ollama"]
        - model: "mistral-small-latest"
          providers: ["mistral"]
        - model: "mistral-large-latest"
          providers: ["mistral"]

egress:
  max_idle_conns: 10
  max_idle_conns_per_host: 2
  idle_timeout: 30s
  max_retries: 3
  base_backoff: 100ms
  retry_on_5xx: false
  disable_keep_alives: false
  circuit_breaker:
    max_failures: 5
    cooldown: 30s

session:
  default_ttl: 30m
  max_ttl: 24h
  cache_ttl: 5m
  cleanup_interval: 5m
  cleanup_enabled: true

admin:
  username: admin
  password: "${ADMIN_PASSWORD}"
  session_ttl: 30m
  dashboard_poll_interval: 5s

otel:
  endpoint: ""
  service_name: "maskchain"
  environment: "development"
  sampling_ratio: 1.0

ratelimit:
  default_rate_per_window: 100
  default_window_sec: 60
  default_token_budget:
    "gemma3:4b": 1000000
  tenant_overrides:
    default:
      rate_per_window: 200
      token_budget:
        "gemma3:4b": 2000000

debug:
  enabled: true
  admin_token: "admin-token"

analytics:
  batch_interval: 5s
  retention_days: 7
  cost_rates:
    - model: "gemma3:4b"
      input_price_per_1k: 0
      output_price_per_1k: 0
    - model: "mistral-small-latest"
      input_price_per_1k: 0.001
      output_price_per_1k: 0.003
    - model: "mistral-large-latest"
      input_price_per_1k: 0.004
      output_price_per_1k: 0.012

dictionary_cache:
  valkey_ttl_sec: 300
  lru_size: 10000
  warm_on_startup: true
  warm_concurrency: 5

tenants:
  default:
    name: "Default Tenant"
    auth_header: "Authorization"
    api_keys:
      - "sk-test-default"
    pii_config:
      enabled: true
      default_action: mask
      rules:
        - label: email
          type: regex
          pattern: EMAIL
          action: block
        - label: phone
          type: regex
          pattern: PHONE
          action: block
        - label: ssn
          type: regex
          pattern: SSN
          action: block
