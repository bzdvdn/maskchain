# MaskChain example config — mounted into Docker containers
# Simple overrides (CONFIG_VALKEY_ADDR, CONFIG_OTEL_ENDPOINT, etc.) can still use env vars.

tenants:
  default:
    name: "Default Tenant"
    auth_header: "Authorization"
    api_keys:
      - "sk-test-default"
    # PII rules are per-tenant via PIIConfig.
    # Enabled=false → PII scanning disabled (dict-only mode).
    # DefaultAction применяется при ошибке engine.Scan (block|allow).
    # Rules: каждый rule содержит тип детектора (pii, financial, secrets) и action (block|allow).
    pii_config:
      enabled: true
      default_action: mask
      rules:
        - label: "email"
          type: "regex"
          pattern: "EMAIL"
          action: "block"
        - label: "phone"
          type: "regex"
          pattern: "PHONE"
          action: "block"
        - label: "ssn"
          type: "regex"
          pattern: "SSN"
          action: "block"
